<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Acceso - Gimnasio</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-bg">
    <span class="blob one"></span>
    <span class="blob two"></span>
  </div>

  <main class="app-shell">
    <header class="hero">
      <p class="kicker">Proyecto JavaScript • Front-end</p>
      <h1>Control de Acceso del Gimnasio</h1>
      <p class="muted">Panel visual para validar accesos, descuentos por fidelidad y busqueda de socios.</p>
    </header>

    <section class="grid-cards">
      <article class="card">
        <h2>Resumen general</h2>
        <div class="summary" id="resumen">
          <p>Presiona el boton para evaluar accesos.</p>
        </div>
        <button id="btn-evaluar">Evaluar todos los accesos</button>
      </article>

      <article class="card">
        <h2>Buscar socio por ID</h2>
        <label for="buscarId">ID</label>
        <div class="search-row">
          <input id="buscarId" type="number" min="1" placeholder="Ej: 2" />
          <button id="btn-buscar">Buscar</button>
        </div>
        <div id="resultado-busqueda" class="search-result">Sin busqueda.</div>
      </article>
    </section>

    <section class="card card-wide">
      <h2>Listado de socios</h2>
      <div id="tarjetas-socios" class="cards-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
